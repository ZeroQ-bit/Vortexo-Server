name: Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional extra image tag (for example v1.2.3)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Set up QEMU
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name vortexo-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute image metadata
        id: vars
        run: |
          IMAGE_NAME="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/vortexo-server" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="main"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          fi

          {
            echo "image_name=${IMAGE_NAME}"
            echo "short_sha=${SHORT_SHA}"
            echo "version=${VERSION}"
            echo "build_date=${BUILD_DATE}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        run: |
          TAG_ARGS=(
            --tag "${{ steps.vars.outputs.image_name }}:main"
            --tag "${{ steps.vars.outputs.image_name }}:main-${{ steps.vars.outputs.short_sha }}"
          )

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_ARGS+=(--tag "${{ steps.vars.outputs.image_name }}:${GITHUB_REF_NAME}")
            TAG_ARGS+=(--tag "${{ steps.vars.outputs.image_name }}:latest")
          fi

          if [[ -n "${{ inputs.version }}" ]]; then
            TAG_ARGS+=(--tag "${{ steps.vars.outputs.image_name }}:${{ inputs.version }}")
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --provenance=false \
            --sbom=false \
            "${TAG_ARGS[@]}" \
            --label "org.opencontainers.image.title=Vortexo Server" \
            --label "org.opencontainers.image.description=Self-hosted media server with Netflix-style UI" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.vars.outputs.version }}" \
            --build-arg "VERSION=${{ steps.vars.outputs.version }}" \
            --build-arg "COMMIT=${{ github.sha }}" \
            --build-arg "BUILD_DATE=${{ steps.vars.outputs.build_date }}" \
            .
